<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Registration Form</title>
	<style>
		* { box-sizing: border-box; font-family: Arial, sans-serif; }
		body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: linear-gradient(135deg, #6a11cb, #2575fc); padding: 20px; }
		.card { width: 100%; max-width: 430px; background: #fff; border-radius: 16px; padding: 28px; box-shadow: 0 20px 50px rgba(0,0,0,.2); }
		h1 { margin: 0 0 20px; text-align: center; font-size: 28px; color: #222; }
		.form-group { margin-bottom: 16px; }
		.row { display: flex; gap: 12px; }
		.row .form-group { flex: 1; }
		label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; color: #444; }
		input, select { width: 100%; padding: 12px 14px; border: 1px solid #d9d9d9; border-radius: 10px; font-size: 15px; outline: none; }
		input:focus, select:focus { border-color: #2575fc; box-shadow: 0 0 0 3px rgba(37,117,252,.12); }
		.radio-group { display: flex; flex-wrap: wrap; gap: 16px; padding-top: 4px; }
		.radio-group label { display: flex; align-items: center; gap: 6px; margin: 0; font-weight: 500; }
		button { width: 100%; margin-top: 8px; border: none; border-radius: 10px; padding: 13px 16px; background: #2575fc; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; }
		button:hover { background: #1d64d8; }
		.footer { margin-top: 14px; text-align: center; font-size: 14px; color: #666; }
		@media (max-width: 560px) { .row { flex-direction: column; } }
	</style>
</head>
<body>
	<div class="card">
		<h1>Registration Form</h1>
		<form id="registrationForm">
			<div class="row">
				<div class="form-group">
					<label for="firstName">First Name</label>
					<input type="text" id="firstName" name="firstName" placeholder="Enter first name" required />
				</div>
				<div class="form-group">
					<label for="lastName">Last Name</label>
					<input type="text" id="lastName" name="lastName" placeholder="Enter last name" required />
				</div>
			</div>

			<div class="form-group">
				<label for="email">Email</label>
				<input type="email" id="email" name="email" placeholder="Enter email" required />
			</div>

			<div class="form-group">
				<label for="password">Password</label>
				<input type="password" id="password" name="password" placeholder="Create password" required />
			</div>

			<div class="form-group">
				<label for="confirmPassword">Confirm Password</label>
				<input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm password" required />
			</div>

			<div class="row">
				<div class="form-group">
					<label for="dob">Date of Birth</label>
					<input type="date" id="dob" name="dob" required />
				</div>
				<div class="form-group">
					<label for="country">Country</label>
					<select id="country" name="country" required>
						<option value="">Select country</option>
						<option>United States</option>
						<option>United Kingdom</option>
						<option>Canada</option>
						<option>India</option>
						<option>Australia</option>
					</select>
				</div>
			</div>

			<div class="form-group">
				<label>Gender</label>
				<div class="radio-group">
					<label><input type="radio" name="gender" value="male" required /> Male</label>
					<label><input type="radio" name="gender" value="female" /> Female</label>
					<label><input type="radio" name="gender" value="other" /> Other</label>
				</div>
			</div>

			<div class="form-group">
				<label for="phone">Phone Number</label>
				<input type="tel" id="phone" name="phone" placeholder="Enter phone number" />
			</div>

			<button type="submit">Register</button>
		</form>
		<div class="footer">Already have an account? Sign in</div>
	</div>
	<script src="../scripts/script1.js" defer></script>
</body>
</html>
